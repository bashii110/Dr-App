name: doctor_app
description: "Doctor appointment app - production ready"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  # UI
  font_awesome_flutter: ^10.7.0
  table_calendar: ^3.1.2
  lottie: ^3.1.2
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  # State & storage
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  # Networking
  http: ^1.2.0
  # Utils
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  pin_code_fields: ^8.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/